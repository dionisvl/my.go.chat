services:
  app:
    build:
      context: .
    ports:
      - "${APP_EXTERNAL_PORT:-8011}:8080"
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_PORT: ":8080"
      DB_DSN: "postgres://${DB_USER:-chat}:${DB_PASSWORD:-chat}@db:5432/${DB_NAME:-chat}?sslmode=disable"
      WELCOME_MESSAGE: ${WELCOME_MESSAGE:-}
      WELCOME_TIMEOUT: ${WELCOME_TIMEOUT:-0}
      PROFANITIES: ${PROFANITIES:-}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-50}
      CORS_TRUSTED_ORIGINS: ${CORS_TRUSTED_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-chat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chat}
      POSTGRES_DB: ${DB_NAME:-chat}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - chat_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chat} -d ${DB_NAME:-chat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chat_pg_data:
