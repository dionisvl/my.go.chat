<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3348;
      --accent: #6c63ff;
      --accent2: #7c73ff;
      --text: #e8eaf6;
      --muted: #8b90b0;
      --green: #4caf7d;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-wrap {
      width: min(480px, 100vw);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-weight: 600; font-size: 15px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; margin-left: auto;
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: pop-in 0.18s ease-out both;
    }
    .msg.mine { align-self: flex-end; align-items: flex-end; }
    .msg.theirs { align-self: flex-start; align-items: flex-start; }
    .msg.system { align-self: center; align-items: center; max-width: 100%; }

    @keyframes pop-in {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg-meta {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }
    .msg-meta .name { font-weight: 600; }

    .bubble {
      padding: 9px 13px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .mine .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .theirs .bubble {
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }
    .system .bubble {
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
    }

    /* group consecutive same-author messages */
    .msg.grouped { margin-top: 1px; }
    .msg.grouped .msg-meta { display: none; }
    .msg.grouped.mine .bubble { border-top-right-radius: 4px; }
    .msg.grouped.theirs .bubble { border-top-left-radius: 4px; }

    /* ── Username bar ── */
    .username-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .username-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .username-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      min-width: 0;
    }
    .username-bar input:focus { border-color: var(--accent); }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 20px 16px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      resize: none;
      outline: none;
      height: 44px;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
      overflow-y: hidden;
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-area textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: var(--accent2); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Disconnected banner ── */
    .reconnect-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      background: #3a1c1c;
      color: #ff8a80;
      font-size: 13px;
      flex-shrink: 0;
    }
    .reconnect-bar.show { display: flex; }
    .reconnect-bar button {
      background: none; border: 1px solid currentColor;
      color: inherit; border-radius: 6px;
      padding: 2px 10px; cursor: pointer; font-size: 12px;
    }
  </style>
</head>
<body>

<div class="chat-wrap">
  <div class="header">
    <div class="header-icon">💬</div>
    <div>
      <div class="header-title">Go Chat</div>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </div>

  <div class="reconnect-bar" id="reconnect-bar">
    Disconnected
    <button onclick="connect()">Reconnect</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="username-bar">
    <label for="username">Name:</label>
    <input id="username" type="text" maxlength="32" placeholder="Your name" />
  </div>

  <div class="input-area">
    <textarea id="msg-input" placeholder="Message… (Enter to send)" rows="1"></textarea>
    <button class="send-btn" id="send-btn" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const usernameEl = document.getElementById('username');
  const msgInput   = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const reconnBar  = document.getElementById('reconnect-bar');

  // Restore username from storage
  usernameEl.value = localStorage.getItem('chat_username') || '';
  usernameEl.addEventListener('input', () => {
    localStorage.setItem('chat_username', usernameEl.value.trim());
  });

  // Persistent color per user (tied to username)
  function getColor(username) {
    const key = 'chat_color_' + username;
    let c = localStorage.getItem(key);
    if (c) return c;
    // generate a bright-ish color
    const hue = Math.floor(Math.random() * 360);
    c = `hsl(${hue},65%,62%)`;
    localStorage.setItem(key, c);
    return c;
  }

  // ── WebSocket ──
  let ws = null;
  let myUsername = '';

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws');

    ws.onopen = () => {
      statusDot.classList.add('online');
      reconnBar.classList.remove('show');
      sendBtn.disabled = false;
    };

    ws.onclose = ws.onerror = () => {
      statusDot.classList.remove('online');
      reconnBar.classList.add('show');
      sendBtn.disabled = true;
    };

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);
      appendMessage(msg);
    };
  }

  connect();

  // ── Render ──
  let lastAuthor = null;

  function appendMessage(msg) {
    myUsername = usernameEl.value.trim() || 'me';
    const isMe     = msg.username === myUsername;
    const isServer = msg.username === 'Server';
    const grouped  = !isServer && msg.username === lastAuthor;

    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isServer ? 'system' : isMe ? 'mine' : 'theirs') + (grouped ? ' grouped' : '');

    if (!isServer) {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      const color = isMe ? '#a8a4ff' : getColor(msg.username);
      meta.innerHTML = `<span class="name" style="color:${color}">${esc(msg.username)}</span>  ${formatTime(msg.time)}`;
      wrap.appendChild(meta);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.message;
    wrap.appendChild(bubble);

    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    lastAuthor = isServer ? null : msg.username;
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Send ──
  function send() {
    const username = usernameEl.value.trim();
    const message  = msgInput.value.trim();
    if (!username) { usernameEl.focus(); return; }
    if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ username, message, color: getColor(username) }));
    msgInput.value = '';
    msgInput.style.height = '44px';
  }

  sendBtn.addEventListener('click', send);

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // auto-grow textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = '44px';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    msgInput.style.overflowY = msgInput.scrollHeight > 120 ? 'auto' : 'hidden';
  });
</script>
</body>
</html>
